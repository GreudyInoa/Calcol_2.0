<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calcol — Acceder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800&family=Oswald:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="frontend/src/styles/variables.css">
    <link rel="stylesheet" href="frontend/src/styles/pages/login.css">
</head>
<body>

    <a href="index.html" class="back-btn">
        <img src="assets/Login/flecha-izquierda.png" alt="volver" width="18" height="18"/>
        Inicio
    </a>

    <div class="login-wrap">
        <div class="login-card">
            <div class="col-imagen">
                <img src="assets/Login/login-doki-piensa.jpeg" alt="Calcol" />
            </div>

            <div class="col-form">
                <div class="tabs">
                    <button class="tab-btn activo" data-tab="login">Iniciar sesión</button>
                    <button class="tab-btn" data-tab="registro">Registrarse</button>
                </div>

                <div class="panel activo" id="panel-login">
                    <h2>Inicia sesión en tu cuenta</h2>

                    <div class="alerta" id="alerta-login">
                        <span>⚠️</span>
                        <span id="alerta-login-txt"></span>
                    </div>

                    <div class="form-group">
                        <input type="email" id="l-email" placeholder="Correo electrónico" autocomplete="email"/>
                        <div class="err-txt" id="l-email-err">Ingresa un correo válido.</div>
                    </div>

                    <div class="form-group pass-wrap">
                        <input type="password" id="l-pass" placeholder="Contraseña" autocomplete="current-password"/>
                        <button class="btn-ojo" id="ojo-l" type="button">👁️</button>
                        <div class="err-txt" id="l-pass-err">Ingresa tu contraseña.</div>
                    </div>

                    <div class="forgot">
                        <a href="pages/recuperar.html">¿Olvidaste tu contraseña?</a>
                    </div>

                    <button class="btn-main" id="btn-login">Iniciar sesión</button>
                </div>

                <div class="panel" id="panel-registro">
                    <h2>Crea tu cuenta</h2>

                    <div class="alerta" id="alerta-reg">
                        <span>⚠️</span>
                        <span id="alerta-reg-txt"></span>
                    </div>

                    <div class="form-group">
                        <input type="text" id="r-nombre" placeholder="Nombre completo" autocomplete="name"/>
                        <div class="err-txt" id="r-nombre-err">Ingresa tu nombre.</div>
                    </div>

                    <div class="form-group tel-wrap">
                        <span class="prefijo">+56</span>
                        <input type="tel" id="r-tel" placeholder="9 1234 5678" maxlength="9"/>
                        <div class="err-txt" id="r-tel-err">Ingresa 9 dígitos válidos.</div>
                    </div>

                    <div class="form-group">
                        <input type="email" id="r-email" placeholder="Correo electrónico" autocomplete="email"/>
                        <div class="err-txt" id="r-email-err">Ingresa un correo válido.</div>
                    </div>

                    <div class="form-group pass-wrap">
                        <input type="password" id="r-pass" placeholder="Contraseña (mínimo 6 caracteres)" autocomplete="new-password"/>
                        <button class="btn-ojo" id="ojo-r" type="button">👁️</button>
                        <div class="err-txt" id="r-pass-err">Mínimo 6 caracteres.</div>
                    </div>

                    <div class="form-group pass-wrap">
                        <input type="password" id="r-pass2" placeholder="Confirmar contraseña" autocomplete="new-password"/>
                        <button class="btn-ojo" id="ojo-r2" type="button">👁️</button>
                        <div class="err-txt" id="r-pass2-err">Las contraseñas no coinciden.</div>
                    </div>

                    <button class="btn-main" id="btn-registro">Crear cuenta</button>
                </div>
            </div>
        </div>
    </div>

    <canvas id="brasas"></canvas>

    <script src="frontend/src/utils/auth.js"></script>
    <script src="frontend/src/utils/validators.js"></script>
    <script src="frontend/src/services/api.js"></script>
    <script src="frontend/src/pages/brasas.js"></script>
    <script src="frontend/src/pages/login.js"></script>
    <script src="frontend/src/components/navbar.js"></script>
</body>
</html>
