<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calcol — Nueva contraseña</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../frontend/src/styles/variables.css">
    <link rel="stylesheet" href="../frontend/src/styles/pages/login.css">
</head>
<body>

    <canvas id="brasas"></canvas>

    <div class="login-wrap">
        <div class="login-card recuperar-card">
            <div class="col-form">

                <div class="recuperar-logo">
                    <img src="../assets/General/doky-calcol-logo.png" alt="Calcol">
                </div>

                <h2 class="recuperar-titulo">Nueva contraseña</h2>
                <p class="recuperar-subtitulo">
                    Ingresa tu nueva contraseña. Debe tener al menos 6 caracteres.
                </p>

                <!-- Token inválido -->
                <div class="token-invalido" id="token-invalido">
                    <p>❌ El link es inválido o ha expirado.</p>
                    <a href="recuperar.html">Solicitar nuevo link</a>
                </div>

                <!-- Formulario -->
                <div id="form-nueva-pass">
                    <div class="alerta" id="alerta-error">
                        <span id="alerta-error-txt"></span>
                    </div>

                    <div class="form-group pass-wrap">
                        <input type="password" id="nueva-pass" placeholder="Nueva contraseña">
                        <button class="btn-ojo" id="ojo-nueva"></button>
                    </div>

                    <div class="form-group pass-wrap">
                        <input type="password" id="confirmar-pass" placeholder="Confirmar contraseña">
                        <button class="btn-ojo" id="ojo-confirmar"></button>
                    </div>

                    <button class="btn-main listo" id="btn-cambiar">
                        Cambiar contraseña
                    </button>
                </div>

                <!-- Éxito -->
                <div class="cambio-exitoso" id="cambio-exitoso">
                    <p>✅ ¡Contraseña cambiada exitosamente!</p>
                    <a class="btn-main listo" href="../login.html">Iniciar sesión</a>
                </div>

            </div>
        </div>
    </div>

    <script src="../frontend/src/utils/validators.js"></script>
    <script src="../frontend/src/services/api.js"></script>
    <script src="../frontend/src/pages/brasas.js"></script>
    <script src="../frontend/src/pages/nueva-password.js"></script>
</body>
</html>
