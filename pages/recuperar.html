<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calcol — Recuperar contraseña</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../frontend/src/styles/variables.css">
    <link rel="stylesheet" href="../frontend/src/styles/pages/login.css">
</head>
<body>

    <canvas id="brasas"></canvas>

    <a class="back-btn" href="../login.html">
        <img src="../assets/Login/flecha-izquierda.png" alt="←">
        Volver al login
    </a>

    <div class="login-wrap">
        <div class="login-card recuperar-card">
            <div class="col-form">

                <div class="recuperar-logo">
                    <img src="../assets/General/doky-calcol-logo.png" alt="Calcol">
                </div>

                <h2 class="recuperar-titulo">¿Olvidaste tu contraseña?</h2>
                <p class="recuperar-subtitulo">
                    Ingresa tu correo y te enviaremos un link para restablecer tu contraseña.
                </p>

                <div class="alerta" id="alerta-error">
                    <span id="alerta-error-txt"></span>
                </div>

                <div class="form-group">
                    <input type="email" id="email" placeholder="Correo electrónico">
                </div>

                <button class="btn-main listo" id="btn-enviar">
                    Enviar link de recuperación
                </button>

                <div class="alerta-exito" id="alerta-exito">
                    ✅ Si tu correo está registrado, recibirás un email con las instrucciones.
                </div>

                <button id="btn-intentar-otro">Intentar con otro correo</button>

            </div>
        </div>
    </div>

    <script src="../frontend/src/utils/validators.js"></script>
    <script src="../frontend/src/services/api.js"></script>
    <script src="../frontend/src/pages/brasas.js"></script>
    <script src="../frontend/src/pages/recuperar.js"></script>
</body>
</html>
